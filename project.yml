name: AnyListen
targets:
  AnyListen:
    type: application
    platform: iOS
    sources:
      - path: AnyListen
        excludes:
          - Info.plist
    info:
      path: AnyListen/Info.plist
      properties:
        NSMicrophoneUsageDescription: "AnyListen needs microphone access to route audio to your selected output."
        UIBackgroundModes: [audio]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Portrait-only (incl. iPad) ⇒ opt out of iPad multitasking; App
        # Store upload validation otherwise demands all four orientations.
        # NOTE: temporary until iPad landscape is properly supported —
        # see "Deferred: iPad landscape" in docs/ROADMAP.md.
        UIRequiresFullScreen: true
        # No non-exempt encryption ⇒ skips the export-compliance question
        # on every App Store Connect submission.
        ITSAppUsesNonExemptEncryption: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anylisten.AnyListen
      DEVELOPMENT_TEAM: 2UD3JL69WU
      GENERATE_INFOPLIST_FILE: false
      TARGETED_DEVICE_FAMILY: "1,2"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      SWIFT_EMIT_LOC_STRINGS: YES
